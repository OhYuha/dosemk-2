<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사진관 예약</title>
</head>
<body>

    <h2>사진관 주말 예약</h2>
    
    <label for="datePicker">예약 날짜 선택 (주말만 가능):</label>
    <input type="date" id="datePicker">
    <br><br>
    
    <label for="customerName">예약자 성함:</label>
    <input type="text" id="customerName" placeholder="홍길동">
    <br><br>

    <button onclick="submitReservation()">사진관 예약하기</button>

    <script>
        function submitReservation() {
            const dateInput = document.getElementById('datePicker').value;
            const nameInput = document.getElementById('customerName').value;

            if (!dateInput || !nameInput) {
                alert("날짜와 성함을 모두 입력해주세요.");
                return;
            }

            const selectedDate = new Date(dateInput);
            const dayOfWeek = selectedDate.getDay(); 

            // 1. 주말 제한 로직
            if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                alert("예약은 주말(토요일, 일요일)에만 가능합니다. 다른 날짜를 선택해주세요.");
                return;
            }

            // 2. Vercel 서버로 데이터 전송
            sendToServer(dateInput, nameInput);
        }

        async function sendToServer(date, name) {
            try {
                // 우리의 안전한 서버(api/reserve.js)로 데이터를 보냅니다.
                const response = await fetch('/api/reserve', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ date: date, name: name })
                });

                if (response.ok) {
                    alert("예약이 성공적으로 완료되었습니다!");
                } else {
                    alert("예약 처리 중 오류가 발생했습니다.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("서버와 통신할 수 없습니다.");
            }
        }
    </script>

</body>
</html>
